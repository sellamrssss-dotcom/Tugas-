<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Koperasi Sekolah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">KOPERASI SEKOLAH</a>
            <div class="ms-auto">
                <span class="text-white"><i class="bi bi-cart-fill"></i> Total Belanja: Rp <span id="total-harga">0</span></span>
            </div>
        </div>
    </nav>

    <section class="container my-5">
        <h3 class="mb-4 text-danger fw-bold">Daftar Produk</h3>
        <div class="row row-cols-1 row-cols-md-3 g-4">
            <div class="col"><div class="card h-100 shadow-sm"><div class="card-body text-center"><h5>Buku Tulis</h5><p class="text-danger fw-bold">Rp 5.000</p><button onclick="tambahKeKeranjang('Buku Tulis', 5000)" class="btn btn-danger w-100">Beli</button></div></div></div>
            <div class="col"><div class="card h-100 shadow-sm"><div class="card-body text-center"><h5>Pulpen</h5><p class="text-danger fw-bold">Rp 3.500</p><button onclick="tambahKeKeranjang('Pulpen', 3500)" class="btn btn-danger w-100">Beli</button></div></div></div>
            <div class="col"><div class="card h-100 shadow-sm"><div class="card-body text-center"><h5>Tas Sekolah</h5><p class="text-danger fw-bold">Rp 150.000</p><button onclick="tambahKeKeranjang('Tas Sekolah', 150000)" class="btn btn-danger w-100">Beli</button></div></div></div>
        </div>

        <div class="mt-5 p-4 bg-white rounded shadow-sm">
            <h4 class="fw-bold mb-3">Daftar Belanja Anda:</h4>
            <ul id="daftar-belanja" class="list-group">
                <li class="list-group-item text-muted">Keranjang masih kosong</li>
            </ul>
            <div class="mt-3 text-end">
                <button onclick="prosesPembayaran()" class="btn btn-success btn-lg">
                    <i class="bi bi-cash-stack"></i> Bayar Sekarang
                </button>
            </div>
        </div>
    </section>

    <div class="modal fade" id="modalPembayaran" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">QR Code Pembayaran</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <p>Silakan scan QR Code di bawah ini untuk membayar:</p>
                    <img id="qr-code-img" src="" alt="QR Code" class="img-fluid mb-3">
                    <h4 id="total-bayar-text"></h4>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="button" class="btn btn-primary" onclick="konfirmasiPembayaran()">Sudah Bayar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let total = 0;
        let daftarBelanja = [];

        function tambahKeKeranjang(nama, harga) {
            total += harga;
            daftarBelanja.push(nama);
            document.getElementById('total-harga').innerText = total.toLocaleString('id-ID');
            let list = document.getElementById('daftar-belanja');
            if(daftarBelanja.length === 1) list.innerHTML = ''; 
            let li = document.createElement('li');
            li.className = 'list-group-item d-flex justify-content-between align-items-center';
            li.innerHTML = `<span>${nama}</span> <span class="badge bg-danger rounded-pill">Rp ${harga.toLocaleString('id-ID')}</span>`;
            list.appendChild(li);
        }

        function prosesPembayaran() {
            if (total === 0) {
                alert("Keranjang Anda masih kosong!");
                return;
            }

            // Generate QR Code dari API pihak ketiga
            let qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=Total_Pembayaran_Rp_" + total;
            document.getElementById('qr-code-img').src = qrUrl;
            document.getElementById('total-bayar-text').innerText = "Total: Rp " + total.toLocaleString('id-ID');

            // Tampilkan Modal
            let myModal = new bootstrap.Modal(document.getElementById('modalPembayaran'));
            myModal.show();
        }

        function konfirmasiPembayaran() {
            alert("Pembayaran Berhasil! Terima kasih telah berbelanja di Koperasi Sekolah.");
            
            // Reset keranjang
            total = 0;
            daftarBelanja = [];
            document.getElementById('total-harga').innerText = '0';
            document.getElementById('daftar-belanja').innerHTML = '<li class="list-group-item text-muted">Keranjang masih kosong</li>';
            
            // Tutup modal
            let modalEl = document.getElementById('modalPembayaran');
            let modal = bootstrap.Modal.getInstance(modalEl);
            modal.hide();
        }
    </script>
</body>
</html>
